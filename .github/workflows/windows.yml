# Windows compile signal. The windows-latest runner is x86_64, so this builds
# the Intel/AMD64 target natively — the direct answer to "does editxr compile on
# Windows?". The ARM64 path is exercised separately (local QEMU VM); since the
# `#if os(Windows)` code is OS-level (Win32 console API), not arch-specific, a
# green build here is strong evidence both Windows arches compile.
#
# NOTE: this is EXPECTED TO FAIL until the platform seam lands — the editor still
# uses termios/ioctl//dev/tty unguarded (see PORTING_TO_WINDOWS.md). The job is
# the harness that turns green as the port is implemented.
name: windows

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # Matches the toolchain version used by the Linux release build.
      - uses: compnerd/gha-setup-swift@main
        with:
          branch: swift-6.3.2-release
          tag: 6.3.2-RELEASE

      - name: Swift version
        run: swift --version

      - name: Build (release)
        run: swift build -c release

      # Bundle the exe with the Swift Windows runtime DLLs so it runs on a
      # machine without the toolchain (e.g. a Windows 11 ARM VM, via Prism).
      - name: Bundle editxr + runtime DLLs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item .build\release\editxr.exe dist\
          $core = where.exe swiftCore.dll 2>$null | Select-Object -First 1
          if (-not $core) { throw "swiftCore.dll not found on PATH" }
          $rt = Split-Path $core
          Write-Host "Swift runtime dir: $rt"
          Copy-Item "$rt\*.dll" dist\ -Force
          Get-ChildItem dist | Sort-Object Length -Descending | Select-Object Name,Length | Format-Table -AutoSize

      - name: Upload editxr bundle
        uses: actions/upload-artifact@v4
        with:
          name: editxr-windows-x64
          path: dist/*

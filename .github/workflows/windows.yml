# Windows build: compile signal on every push/PR, and on a tag it packages a
# self-contained zip (editxr.exe + the Swift Windows runtime DLLs) and attaches
# it to that tag's draft GitHub release.
#
# x64 only. The x86_64 build runs on Intel/AMD *and* on Windows on ARM via the
# OS's built-in x64 emulation (Prism) — verified by hand on a Windows 11 ARM VM.
# A native arm64 build isn't produced yet: there's no Swift arm64 Windows
# toolchain on GitHub's hosted `windows-11-arm` runners (the setup action falls
# back to the x64 toolchain, which crashes on the ARM host). Revisit when an
# arm64 toolchain ships.
name: windows

on:
  push:
    tags: ['v*']
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # Matches the toolchain version used by the Linux release build.
      - uses: compnerd/gha-setup-swift@main
        with:
          branch: swift-6.3.2-release
          tag: 6.3.2-RELEASE

      - name: Swift version
        run: swift --version

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build (release)
        run: swift build -c release

      # Self-contained bundle: the exe + the Swift Windows runtime DLLs (gathered
      # from the toolchain's runtime dir) so it runs on a stock Windows machine.
      - name: Package
        shell: pwsh
        run: |
          $name = "editxr-${{ steps.ver.outputs.version }}-windows-x64"
          New-Item -ItemType Directory -Force $name | Out-Null
          Copy-Item .build\release\editxr.exe $name\
          $core = where.exe swiftCore.dll 2>$null | Select-Object -First 1
          if (-not $core) { throw "swiftCore.dll not found on PATH" }
          Write-Host "Swift runtime dir: $(Split-Path $core)"
          Copy-Item "$(Split-Path $core)\*.dll" $name\ -Force
          Compress-Archive -Path $name -DestinationPath "$name.zip" -Force
          Get-ChildItem "$name.zip" | Format-Table Name,Length -AutoSize

      - name: Upload workflow artifact (for testing)
        uses: actions/upload-artifact@v4
        with:
          name: editxr-windows-x64
          path: editxr-*-windows-x64.zip

      - name: Attach to draft release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: editxr-*-windows-x64.zip
